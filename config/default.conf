# ─────────────────────────────────────────────────────────────
# webserv – default configuration (42 school Webserv project)
# Usage: ./webserv config/default.conf
# ─────────────────────────────────────────────────────────────

# ── Primary virtual host ──────────────────────────────────────
server {
    listen       8080;
    server_name  localhost webserv.local;
    root         ./www/html;
    index        index.html;
    client_max_body_size 10M;

    error_page 400 ./www/errors/400.html;
    error_page 403 ./www/errors/403.html;
    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 413 ./www/errors/413.html;
    error_page 500 ./www/errors/500.html;

    # Default location – GET & POST only, no directory listing
    location / {
        allow_methods GET POST DELETE;
        autoindex off;
    }

    # File upload endpoint
    location /upload {
        allow_methods GET POST;
        upload_dir ./www/uploads;
        client_max_body_size 50M;
    }

    # Python CGI scripts
    location /cgi-bin {
        allow_methods GET POST;
        cgi_pass /usr/bin/python3;
        cgi_ext .py;
        root ./www/cgi-bin;
    }

    # Static directory listing
    location /files {
        allow_methods GET;
        root ./www;
        autoindex on;
    }

    # Permanent redirect example
    location /old {
        return 301 /;
    }
}

# ── Secondary virtual host on the SAME port ───────────────────
# Demonstrates virtual hosting: Host: api.local routes here.
server {
    listen       8080;
    server_name  api.local;
    root         ./www/api;
    index        index.html;
    client_max_body_size 1M;

    location / {
        allow_methods GET POST DELETE;
        autoindex on;
    }
}

# ── Second port ───────────────────────────────────────────────
server {
    listen       8081;
    server_name  localhost;
    root         ./www/html;
    index        index.html;
    client_max_body_size 1M;

    location / {
        allow_methods GET;
        autoindex off;
    }
}
